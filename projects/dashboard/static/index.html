<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>whoopee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;450;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* warm near-black, not blue-black */
    --bg: #14110f;
    --bg-soft: #1b1714;
    --card: #1c1815;
    --edge: #2a241f;
    --edge-soft: #221d19;
    /* warm neutral text ramp */
    --ink: #f4efe8;
    --ink-2: #cfc6ba;
    --muted: #9a9085;
    --faint: #6d655c;
    /* semantic — only these carry meaning */
    --good: #5fc88a;
    --mid: #e0b15e;
    --low: #e8745a;
    --cool: #7ba7d0;   /* whoop / secondary series */
    --sans: "Inter", -apple-system, system-ui, sans-serif;
    --serif: "Fraunces", Georgia, serif;
    --mono: "IBM Plex Mono", ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink-2); font-family: var(--sans); -webkit-font-smoothing: antialiased; line-height: 1.5; }
  .wrap { max-width: 940px; margin: 0 auto; padding: 40px 28px 48px; }
  a { color: inherit; }

  header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 44px; }
  .wordmark { font-family: var(--serif); font-size: 21px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }
  .wordmark span { color: var(--muted); font-weight: 400; }
  .meta { font-family: var(--mono); font-size: 11.5px; color: var(--faint); display: flex; gap: 16px; align-items: center; }
  .meta .live { display: inline-flex; gap: 6px; align-items: center; }
  .meta .pip { width: 5px; height: 5px; border-radius: 50%; background: var(--good); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:.9} 50%{opacity:.2} }
  .meta button { font: inherit; color: var(--muted); background: none; border: none; cursor: pointer; padding: 0; border-bottom: 1px solid var(--edge); }
  .meta button:hover { color: var(--ink); }

  /* ---- HERO: how am I, and why ---- */
  .hero { display: grid; grid-template-columns: 280px 1fr; gap: 48px; align-items: center; margin-bottom: 16px; }
  .dial { position: relative; width: 280px; height: 280px; }
  .dial canvas { width: 280px; height: 280px; }
  .dial .center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-top: 6px; }
  .dial .score { font-family: var(--serif); font-size: 72px; font-weight: 500; line-height: 1; letter-spacing: -0.02em; }
  .dial .scoremax { font-family: var(--mono); font-size: 12px; color: var(--faint); margin-top: 2px; }
  .dial .word { font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; margin-top: 10px; }

  .why .eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--faint); margin-bottom: 6px; }
  .why h1 { font-family: var(--serif); font-size: 28px; font-weight: 500; color: var(--ink); margin: 0 0 22px; line-height: 1.25; letter-spacing: -0.01em; }
  .why h1 em { font-style: normal; }
  /* component meters: each signal vs your own range */
  .signals { display: flex; flex-direction: column; gap: 14px; }
  .sig { display: grid; grid-template-columns: 110px 1fr 70px; align-items: center; gap: 14px; }
  .sig .name { font-size: 13.5px; color: var(--ink-2); }
  .sig .meter { position: relative; height: 6px; background: var(--bg-soft); border-radius: 3px; }
  .sig .meter .base { position: absolute; left: 50%; top: -3px; bottom: -3px; width: 1px; background: var(--edge); }
  .sig .meter .dot { position: absolute; top: 50%; width: 9px; height: 9px; border-radius: 50%; transform: translate(-50%,-50%); transition: left .6s cubic-bezier(.2,.8,.2,1); }
  .sig .val { text-align: right; font-family: var(--mono); font-size: 12.5px; color: var(--ink); }
  .sig .val .u { color: var(--faint); font-size: 10.5px; }

  /* ---- section rhythm ---- */
  section { margin-top: 56px; }
  .sec-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
  .sec-head h2 { font-family: var(--serif); font-size: 19px; font-weight: 500; color: var(--ink); margin: 0; letter-spacing: -0.01em; }
  .sec-head .note { font-size: 12.5px; color: var(--faint); }

  .card { background: var(--card); border: 1px solid var(--edge-soft); border-radius: 10px; padding: 22px 24px; }

  /* trend */
  canvas.chart { display: block; width: 100%; cursor: crosshair; }
  .chart-legend { display: flex; gap: 20px; font-size: 12px; color: var(--muted); margin-top: 14px; align-items: center; }
  .chart-legend .sw { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 7px; vertical-align: middle; }
  .chart-legend .right { margin-left: auto; color: var(--faint); font-family: var(--mono); font-size: 11px; }

  /* comeback band */
  .band { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 28px; }
  .band .col .lab { font-size: 12px; color: var(--muted); margin-bottom: 8px; }
  .band .col .pair { display: flex; align-items: baseline; gap: 10px; }
  .band .col .then { font-family: var(--mono); font-size: 15px; color: var(--faint); }
  .band .col .now { font-family: var(--serif); font-size: 30px; font-weight: 500; color: var(--ink); }
  .band .col .now .u { font-family: var(--mono); font-size: 12px; color: var(--faint); font-weight: 400; }
  .arrow.up { color: var(--good); } .arrow.down { color: var(--low); } .arrow.flat { color: var(--muted); }
  .band-note { font-size: 13px; color: var(--muted); margin-top: 18px; padding-top: 16px; border-top: 1px solid var(--edge-soft); }
  .band-note b { color: var(--ink-2); font-weight: 600; }

  /* drivers */
  .two { display: grid; grid-template-columns: 1fr 1fr; gap: 36px; }
  @media (max-width: 720px){ .two,.hero,.band { grid-template-columns: 1fr; } .dial{margin:0 auto} }
  .drv { display: grid; grid-template-columns: 130px 1fr 46px; align-items: center; gap: 12px; padding: 7px 0; }
  .drv .dk { font-size: 13.5px; color: var(--ink-2); }
  .drv .db { position: relative; height: 8px; background: var(--bg-soft); border-radius: 4px; }
  .drv .db .mid { position: absolute; left: 50%; top: -3px; bottom: -3px; width: 1px; background: var(--edge); }
  .drv .seg { position: absolute; top: 1px; bottom: 1px; border-radius: 3px; transition: width .5s ease; }
  .drv .dv { text-align: right; font-family: var(--mono); font-size: 12.5px; }

  /* trust — demoted to a quiet footnote-style line */
  .trust { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; font-size: 13px; color: var(--muted); }
  .trust .big { font-family: var(--serif); font-size: 24px; color: var(--ink); font-weight: 500; }
  .trust .chip { font-family: var(--mono); font-size: 12px; color: var(--ink-2); }
  .trust .chip b { color: var(--faint); font-weight: 400; }

  /* log */
  details.log { border-top: 1px solid var(--edge-soft); }
  details.log summary { list-style: none; cursor: pointer; padding: 16px 0 4px; display: flex; justify-content: space-between; align-items: baseline; }
  details.log summary::-webkit-details-marker { display: none; }
  details.log summary .h { font-family: var(--serif); font-size: 19px; color: var(--ink); }
  details.log summary .c { font-size: 12.5px; color: var(--faint); }
  .scroll { max-height: 420px; overflow-y: auto; margin-top: 12px; }
  .scroll::-webkit-scrollbar { width: 8px; } .scroll::-webkit-scrollbar-thumb { background: var(--edge); border-radius: 4px; }
  table { width: 100%; border-collapse: collapse; font-family: var(--mono); font-size: 12px; }
  th,td { text-align: right; padding: 7px 10px; white-space: nowrap; border-bottom: 1px solid var(--edge-soft); }
  th { position: sticky; top: 0; background: var(--bg); color: var(--faint); font-weight: 400; font-size: 10.5px; letter-spacing: 0.04em; text-transform: uppercase; }
  td { color: var(--ink-2); } td:first-child, th:first-child { text-align: left; color: var(--muted); }
  .cool { color: var(--cool); } .warm { color: var(--good); }
  tbody tr:hover td { background: var(--bg-soft); }

  .tip { position: fixed; pointer-events: none; background: var(--bg-soft); border: 1px solid var(--edge); border-radius: 8px; padding: 10px 12px; font-size: 12px; color: var(--ink); z-index: 100; opacity: 0; transition: opacity .12s; box-shadow: 0 10px 30px rgba(0,0,0,.5); }
  .tip .d { font-family: var(--mono); color: var(--muted); margin-bottom: 5px; }
  .tip .r { display: flex; justify-content: space-between; gap: 20px; font-family: var(--mono); }
  .tip .r span:first-child { color: var(--muted); }
  .loading { color: var(--faint); padding: 80px 0; text-align: center; font-family: var(--mono); }
  .changed { animation: fl 1.1s ease-out; } @keyframes fl { from { color: var(--good); } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="wordmark">whoopee <span>· sleep & recovery</span></div>
    <div class="meta">
      <span class="live"><span class="pip"></span>live</span>
      <span id="stamp">—</span>
      <button id="refresh">refresh</button>
    </div>
  </header>
  <div id="root"><div class="loading">reading last night…</div></div>
</div>
<div class="tip" id="tip"></div>

<script>
const $=(s,p=document)=>p.querySelector(s);
const fmt=(v,d=1)=>v==null?"—":(+v).toFixed(d);
const tip=$("#tip");
let built=false, lastVals={};
function setv(id,val){const el=document.getElementById(id);if(!el)return;const s=String(val);if(el.textContent!==s){el.textContent=s;if(built&&lastVals[id]!==undefined&&lastVals[id]!==s){el.classList.remove("changed");void el.offsetWidth;el.classList.add("changed");}lastVals[id]=s;}}
const bandColor=b=>b==="high"?"var(--good)":b==="low"?"var(--low)":"var(--mid)";
const bandWord=b=>b==="high"?"primed":b==="low"?"run down":"steady";

async function getData(refresh){const r=await fetch("/api/summary"+(refresh?"?refresh=1":""));return r.json();}
async function boot(){const d=await getData(false);build(d);built=true;update(d);setInterval(async()=>{try{update(await getData(false));}catch(e){}},10000);}

function build(d){
  const rd=d.readiness||{};
  $("#root").innerHTML=`
    <div class="hero">
      <div class="dial">
        <canvas id="dial" width="280" height="280"></canvas>
        <div class="center">
          <div class="score" id="rd_score" style="color:${bandColor(rd.band)}">—</div>
          <div class="scoremax">readiness · vs your norm</div>
          <div class="word" id="rd_word" style="color:${bandColor(rd.band)}">—</div>
        </div>
      </div>
      <div class="why">
        <div class="eyebrow" id="rd_date">last night</div>
        <h1 id="rd_head">—</h1>
        <div class="signals" id="signals"></div>
      </div>
    </div>

    <section>
      <div class="sec-head"><h2>Recovery, week over week</h2><span class="note" id="trend_note">HRV, both sensors</span></div>
      <div class="card">
        <canvas id="trend" class="chart" height="220"></canvas>
        <div class="chart-legend">
          <span><span class="sw" style="background:var(--good)"></span>Eight Sleep HRV</span>
          <span><span class="sw" style="background:var(--cool)"></span>WHOOP HRV</span>
          <span class="right">hover any night</span>
        </div>
      </div>
    </section>

    <section id="comeback_sec">
      <div class="sec-head"><h2>Back on the wrist</h2><span class="note" id="cb_note">—</span></div>
      <div class="card">
        <div class="band">
          ${[["sleep score","ss",""],["HRV","hv",""],["resting HR","rh","bpm"]].map(([l,id,u])=>`
            <div class="col"><div class="lab">${l}</div>
              <div class="pair"><span class="then" id="cbf_${id}">—</span><span class="arrow" id="cba_${id}">→</span><span class="now"><span id="cbn_${id}">—</span> <span class="u">${u}</span></span></div>
            </div>`).join("")}
        </div>
        <div class="band-note" id="cb_band_note">—</div>
      </div>
    </section>

    <section>
      <div class="sec-head"><h2>What actually moves your numbers</h2><span class="note" id="drv_note">—</span></div>
      <div class="card two">
        <div><div style="font-size:12.5px;color:var(--muted);margin-bottom:12px">→ sleep score</div><div id="drv_sleep"></div></div>
        <div><div style="font-size:12.5px;color:var(--muted);margin-bottom:12px">→ HRV</div><div id="drv_hrv"></div></div>
      </div>
    </section>

    <section>
      <div class="sec-head"><h2>Two sensors, checked against each other</h2></div>
      <div class="card trust" id="trust">—</div>
    </section>

    <section>
      <details class="log">
        <summary><span class="h">Every night</span><span class="c" id="log_c">—</span></summary>
        <div class="scroll"><table>          <thead><tr><th>night</th><th>readiness</th><th class="cool">W·rec</th><th class="cool">W·hrv</th><th class="warm">E·score</th><th class="warm">E·hrv</th><th class="warm">E·hr</th><th class="warm">deep</th><th class="warm">rem</th><th class="warm">sleep</th></tr></thead>
          <tbody id="log_body"></tbody>
        </table></div>
      </details>
    </section>`;
  $("#refresh").addEventListener("click",async()=>{$("#refresh").textContent="…";update(await getData(true));$("#refresh").textContent="refresh";});
}

function update(d){
  const {nights,trust,comeback,drivers,readiness:rd}=d;
  setv("stamp",new Date(d.pulled_at*1000).toLocaleString([], {weekday:'short',hour:'2-digit',minute:'2-digit'}));

  // hero
  if(rd&&rd.score!=null){
    setv("rd_score",rd.score);
    const w=bandWord(rd.band); const wel=$("#rd_word"); wel.textContent=w; wel.style.color=bandColor(rd.band);
    $("#rd_score").style.color=bandColor(rd.band);
    setv("rd_date",niceDate(rd.date));
    $("#rd_head").innerHTML=headline(rd);
    drawDial(rd.score,rd.band);
    renderSignals(rd.components);
  }

  // trend
  drawTrend(nights);

  // comeback
  const c=comeback,b=c.baseline_eightsleep_avg,n=c.recent7_eightsleep_avg;
  if(c.gap) setv("cb_note",`${c.gap.days} days off · resumed around now`);
  thenNow("ss",b.sleep_score,n.sleep_score,0,true);
  thenNow("hv",b.hrv,n.hrv,1,true);
  thenNow("rh",b.hr,n.hr,1,false);
  $("#cb_band_note").innerHTML = c.gap
    ? `Eight Sleep logged all <b>${c.eightsleep_only_nights}</b> nights you were off WHOOP — that's how we know the “then.”`
    : "Both devices active.";

  // drivers
  setv("drv_note",`Pearson r across ${drivers.n} nights`);
  fillDrivers("drv_sleep",drivers.sleep_score_drivers,5);
  fillDrivers("drv_hrv",drivers.hrv_drivers,4);

  // trust
  const ag=trust.overall_agreement;
  $("#trust").innerHTML=`<span class="big">${ag==null?"—":(ag).toFixed(2)}</span><span>mean agreement over ${trust.overlapping_nights} shared nights</span>`
    + ["hrv","resting_hr","respiratory"].map(k=>`<span class="chip"><b>${k.replace("_"," ")}</b> ${trust.correlations[k]==null?"—":trust.correlations[k].toFixed(2)}</span>`).join("");

  // log
  setv("log_c",`${nights.length} nights`);
  const body=$("#log_body");const html=nights.slice().reverse().map(rowHtml).join("");if(body.innerHTML!==html)body.innerHTML=html;
}

function niceDate(s){if(!s)return"last night";const dt=new Date(s+"T12:00");return dt.toLocaleDateString([], {weekday:'long',month:'long',day:'numeric'});}
function headline(rd){
  const dr=rd.driver; const w=bandWord(rd.band);
  if(!dr) return `You're <em style="color:${bandColor(rd.band)}">${w}</em>.`;
  const dirWord = dr.z>=0 ? "above" : "below";
  const col = (dr.z>=0)===(dr.key!=="es_hr") ? "var(--good)" : "var(--low)";
  return `You're <em style="color:${bandColor(rd.band)}">${w}</em> — mostly because <em style="color:${col}">${dr.label.toLowerCase()}</em> came in ${Math.abs(dr.z).toFixed(1)}σ ${dirWord} your usual.`;
}

function renderSignals(comps){
  const cont=$("#signals");
  const units={es_hrv:"",es_hr:" bpm",es_deep_pct:"%",es_rem_pct:"%",es_sleep_hours:" h"};
  cont.innerHTML=comps.map(c=>{
    const pos=Math.max(4,Math.min(96, 50 + c.z*22));
    const good=c.score>=50;
    const col=good?"var(--good)":c.score<38?"var(--low)":"var(--mid)";
    const d=c.key==="es_sleep_hours"?1:c.key==="es_hrv"?1:0;
    return `<div class="sig">
      <span class="name">${c.label}</span>
      <span class="meter"><span class="base"></span><span class="dot" style="left:${pos}%;background:${col}"></span></span>
      <span class="val">${fmt(c.value,d)}<span class="u">${units[c.key]||""}</span></span>
    </div>`;
  }).join("");
}

function thenNow(id,from,to,d,higherGood){
  const f=document.getElementById("cbf_"+id),a=document.getElementById("cba_"+id),nn=document.getElementById("cbn_"+id);
  if(!nn)return; f.textContent=from==null?"—":(+from).toFixed(d); nn.textContent=to==null?"—":(+to).toFixed(d);
  if(from==null||to==null){a.textContent="→";a.className="arrow flat";return;}
  const diff=to-from,eps=d===0?0.5:0.05,flat=Math.abs(diff)<eps,up=diff>0,good=higherGood?up:!up;
  a.textContent=flat?"→":up?"↗":"↘"; a.className="arrow "+(flat?"flat":good?"up":"down");
}

function fillDrivers(id,list,max){
  const cont=document.getElementById(id);
  cont.innerHTML=list.slice(0,max).map(dd=>{
    const pos=dd.r>=0,mag=Math.min(100,Math.abs(dd.r)*150)/2;
    const col=pos?"var(--good)":"var(--low)";
    return `<div class="drv"><span class="dk">${dd.label}</span><span class="db"><span class="mid"></span><span class="seg" style="${pos?'left:50%':'right:50%'};width:${mag}%;background:${col}"></span></span><span class="dv" style="color:${col}">${pos?"+":""}${dd.r.toFixed(2)}</span></div>`;
  }).join("");
}

function rowHtml(n){
  return `<tr><td>${n.date}</td>
    <td>${n.whoop_recovery==null?"—":Math.round(n.whoop_recovery)}</td>
    <td class="cool">${n.whoop_recovery==null?"—":Math.round(n.whoop_recovery)}</td>
    <td class="cool">${fmt(n.whoop_hrv_ms,0)}</td>
    <td class="warm">${n.es_score==null?"—":n.es_score}</td>
    <td class="warm">${fmt(n.es_hrv,1)}</td>
    <td class="warm">${fmt(n.es_hr,0)}</td>
    <td class="warm">${fmt(n.es_deep_pct,0)}</td>
    <td class="warm">${fmt(n.es_rem_pct,0)}</td>
    <td class="warm">${fmt(n.es_sleep_hours,1)}</td></tr>`;
}

/* ---------- dial ---------- */
function drawDial(score,band){
  const cv=$("#dial");if(!cv)return;const dpr=devicePixelRatio||1;cv.width=280*dpr;cv.height=280*dpr;
  const ctx=cv.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);
  const cx=140,cy=140,r=110,a0=Math.PI*0.75,a1=Math.PI*2.25;
  ctx.clearRect(0,0,280,280);
  ctx.lineCap="round";
  ctx.strokeStyle="#2a241f";ctx.lineWidth=10;ctx.beginPath();ctx.arc(cx,cy,r,a0,a1);ctx.stroke();
  const col=band==="high"?"#5fc88a":band==="low"?"#e8745a":"#e0b15e";
  const a=a0+(a1-a0)*Math.max(0,Math.min(100,score))/100;
  ctx.strokeStyle=col;ctx.lineWidth=10;ctx.beginPath();ctx.arc(cx,cy,r,a0,a);ctx.stroke();
  // tick at 50 (your baseline)
  const at=a0+(a1-a0)*0.5;ctx.strokeStyle="#6d655c";ctx.lineWidth=2;ctx.beginPath();
  ctx.moveTo(cx+Math.cos(at)*(r-9),cy+Math.sin(at)*(r-9));ctx.lineTo(cx+Math.cos(at)*(r+9),cy+Math.sin(at)*(r+9));ctx.stroke();
}

/* ---------- trend ---------- */
function zs(a){const v=a.filter(x=>x!=null);if(v.length<2)return a.map(()=>null);const m=v.reduce((x,y)=>x+y)/v.length;const sd=Math.sqrt(v.reduce((x,y)=>x+(y-m)**2,0)/v.length)||1;return a.map(x=>x==null?null:(x-m)/sd);}
let TR=null;
function drawTrend(nights){
  const cv=$("#trend");if(!cv)return;const dpr=devicePixelRatio||1,W=cv.clientWidth,H=220;cv.width=W*dpr;cv.height=H*dpr;
  const ctx=cv.getContext("2d");ctx.setTransform(dpr,0,0,dpr,0,0);
  const e=zs(nights.map(n=>n.es_hrv)),w=zs(nights.map(n=>n.whoop_hrv_ms));
  const pad={l:14,r:14,t:16,b:20},iW=W-pad.l-pad.r,iH=H-pad.t-pad.b;
  const all=[...e,...w].filter(x=>x!=null),min=Math.min(-2.2,...all),max=Math.max(2.2,...all);
  const X=i=>pad.l+iW*i/Math.max(1,nights.length-1),Y=v=>pad.t+iH*(1-(v-min)/(max-min));
  TR={nights,e,w,X,Y,pad,W,H,iH};
  paintTrend(-1);
}
function paintTrend(hover){
  const s=TR;if(!s)return;const ctx=$("#trend").getContext("2d");ctx.clearRect(0,0,s.W,s.H);
  // baseline at 0
  ctx.strokeStyle="#2a241f";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(s.pad.l,s.Y(0));ctx.lineTo(s.W-s.pad.r,s.Y(0));ctx.stroke();
  const ov=s.nights.map((n,i)=>(n.whoop_hrv_ms!=null&&n.es_hrv!=null)?i:null).filter(i=>i!=null);
  if(ov.length){const x0=s.X(Math.min(...ov)),x1=s.X(Math.max(...ov));ctx.fillStyle="rgba(123,167,208,0.07)";ctx.fillRect(x0,s.pad.t,Math.max(2,x1-x0),s.iH);}
  const smooth=(vals,color,wd)=>{ctx.strokeStyle=color;ctx.lineWidth=wd;ctx.beginPath();let st=false;vals.forEach((v,i)=>{if(v==null){st=false;return;}const px=s.X(i),py=s.Y(v);if(!st){ctx.moveTo(px,py);st=true;}else ctx.lineTo(px,py);});ctx.stroke();};
  smooth(s.w,"#7ba7d0",1.5);smooth(s.e,"#5fc88a",2);
  if(hover>=0){const px=s.X(hover);ctx.strokeStyle="#4a423a";ctx.beginPath();ctx.moveTo(px,s.pad.t);ctx.lineTo(px,s.pad.t+s.iH);ctx.stroke();
    [["#7ba7d0",s.w],["#5fc88a",s.e]].forEach(([c,v])=>{if(v[hover]!=null){ctx.fillStyle=c;ctx.beginPath();ctx.arc(px,s.Y(v[hover]),3.4,0,7);ctx.fill();}});}
}
function trendHover(ev){
  const s=TR;if(!s)return;const rect=$("#trend").getBoundingClientRect();const x=ev.clientX-rect.left;
  const i=Math.round((x-s.pad.l)/((s.W-s.pad.l-s.pad.r)/Math.max(1,s.nights.length-1)));
  if(i<0||i>=s.nights.length){tip.style.opacity=0;paintTrend(-1);return;}
  const n=s.nights[i];paintTrend(i);
  tip.innerHTML=`<div class="d">${niceDate(n.date)}</div>
    <div class="r"><span>Eight Sleep HRV</span><span style="color:var(--good)">${fmt(n.es_hrv,1)}</span></div>
    <div class="r"><span>WHOOP HRV</span><span style="color:var(--cool)">${fmt(n.whoop_hrv_ms,0)} ms</span></div>
    <div class="r"><span>sleep score</span><span>${n.es_score??"—"}</span></div>`;
  tip.style.left=(ev.clientX+16)+"px";tip.style.top=(ev.clientY+16)+"px";tip.style.opacity=1;
}
document.addEventListener("mousemove",e=>{if(e.target&&e.target.id==="trend")trendHover(e);else if(tip.style.opacity!=="0"){tip.style.opacity=0;paintTrend(-1);}});
addEventListener("resize",()=>{if(window.__d)drawTrend(window.__d.nights);});
const _u=update;update=function(d){window.__d=d;_u(d);};
boot();
</script>
